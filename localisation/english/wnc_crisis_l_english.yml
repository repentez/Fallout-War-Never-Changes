l_english:
  # Crisis Law Categories
  Crisis_policies:0 "Crisis Policies"
  Resource_Crisis:0 "Resource Crisis"
  Energy_Crisis:0 "Energy Crisis" 
  Food_Crisis:0 "Food Crisis"

  # Resource Crisis
  Stable_Supply_Chains:0 "Stable Supply Chains"
  Stable_Supply_Chains_desc:0 "Trade flows smoothly, warehouses full, and the assembly lines hum with uninterrupted production."
  Small_Resource_Shortage:0 "Small Shortage"
  Small_Resource_Shortage_desc:0 "Imports arrive late, substitutions rise, but industry can still mask the cracks."
  Moderate_Resource_Shortage:0 "Moderate Shortage"
  Moderate_Resource_Shortage_desc:0 "Trade disputes choke ports, and bureaucrats ration what little remains."
  Severe_Resource_Shortage:0 "Severe Shortage"
  Severe_Resource_Shortage_desc:0 "Factories idle for lack of steel and oil; civilian anger mounts as essentials vanish."
  Shortages_out_of_control:0 "Shortages Out of Control"
  Shortages_out_of_control_desc:0 "Markets collapse, black markets thrive, and the state seizes what scraps it can."

  # Energy Crisis
  Energy_Abundance:0 "Energy Abundance"
  Energy_Abundance_desc:0 "Lights blaze across the cities, reactors hum, and fuel convoys run without delay."
  Minor_Blackouts:0 "Minor Blackouts"
  Minor_Blackouts_desc:0 "Occasional outages darken neighborhoods, a nuisance more than a disaster."
  Rolling_Blackouts:0 "Rolling Blackouts"
  Rolling_Blackouts_desc:0 "Power cuts follow a schedule; candles and generators become household staples."
  Major_Blackouts:0 "Major Blackouts"
  Major_Blackouts_desc:0 "Research halts, factories slow, and citizens sleep under a sky of dead neon."
  Near_Complete_Blackouts:0 "Near-Complete Blackouts"
  Near_Complete_Blackouts_desc:0 "Only critical sectors remain powered; homes, schools, and hospitals fall dark."
  Complete_Blackouts:0 "Complete Blackouts"
  Complete_Blackouts_desc:0 "The grid collapses entirely. Industry stalls, cities freeze, and survival replaces progress."

  # Food Crisis
  Agricultural_Boom:0 "Agricultural Boom"
  Agricultural_Boom_desc:0 "Granaries overflow, fresh bread fills markets, and no one goes hungry."
  Minor_Food_Shortage:0 "Minor Food Shortage"
  Minor_Food_Shortage_desc:0 "Ration cards appear; complaints grow, but no one starves—yet."
  Moderate_Food_Shortage:0 "Moderate Food Shortage"
  Moderate_Food_Shortage_desc:0 "Queues stretch for blocks; malnutrition creeps in, and tempers flare."
  Severe_Food_Shortage:0 "Severe Food Shortage"
  Severe_Food_Shortage_desc:0 "Riots spark over empty shelves, and hunger gnaws at both soldier and civilian."
  Famines_Rampant:0 "Famines Rampant"
  Famines_Rampant_desc:0 "Starvation becomes normal. Families fracture, riots rage, and surrender seems merciful."

