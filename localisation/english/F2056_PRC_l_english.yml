 prc.c.news.1.t:0 "Beijing Stockmarket closes at an all new low."
 prc.c.news.1.d:0 "Since the resource crisis began, stocks across China have become extremely volatile. The situation has only gotten worse but today, Whang has been forced to acknowledge the situation as it is after the Shanghai stock market closed this week for its 8th week of consecutive market losses. Companies are beginning to close, stocks are collapsing and with limited tools to respond there is nothing the CCP can do to prevent what's coming."
 prc.c.news.1.a:0 "Clearly this is due to American interference"
 prc.c.news.1.b:0 "This is why we don't want Communism"
 prc.c.news.1.c:0 "Deserves them right"

