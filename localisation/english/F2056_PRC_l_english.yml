 prc.crisis.1.t:0 "People’s Congress Suspends Subsidising the economy"
 prc.crisis.1.d:0 "Since the 90’s China has been subsidizing a large portion of its economy so that it could compete with the world with cheaper goods. However with the world market collapsing into days similar to the western depression, it has become no longer feasible to continue this model.its not even been a week since the announcement and Companies are already declaring bankruptcy, while others are planning mass lay offs"
 prc.crisis.1.a:0 "The Government's hands are tied"

 prc.crisis.2.t:0 "Strikes Throughout Beijing"
 prc.crisis.2.d:0 "Its been a week since the economy stopped being Subsidized by the CCP and multiple major manufacturing sectors have collapsed. Whang could not have known that the economic impact would have been this bad but now throughout the east coast Chinese workers in the sectors still seeing profits are beginning to strike. With job security uncertain and state protection unclear,  they are demanding worker protections, resumption of some subsidisations and pay rises."
 prc.crisis.2.a:0 "The Party will endure"

 prc.crisis.3.t:0 "Minister worried of bank stormings"
 prc.crisis.3.d:0 "The minister of Public Security Yin Zian has come to the CCP warning that Public perception of the financial crisis is going to lead to Bank Runs across the Major banking firms. Whang’s Bloc with backing of the Reformists seek to restrict and limit money allowed to be withdrawn from banks and deploy Monitors to the banks to make sure unrest is spotted and stopped quickly. The Military bloc and the Progress Block have refused to vote in favor. The Military wants to go further and deploy the military to patrol the banks and nationalise the privatized controlling stocks of the bank."
 prc.crisis.3.a:0 "For party unity, concede and add patrols"
 prc.crisis.3.b:0 "Whang and the Reformist don’t need to negotiate"

  prc.crisis.4.t:0 "Oil protests resume March"
  prc.crisis.4.d:0 "The roads of the nation have become barren, as nobody can afford the price of petrol, especially since the subsidization of the last oil drilling companies of the nation has ended. Whang’s original policy of appeasement by renewing subsidisation only could have lasted us so long due to it being funded by defunding partly major stability enforcers like the PAP. Now major cities like Hong Kong and Beijing are seeing mass protests, with rumors of it spreading. Cheng is demanding we declare them riots and send in the police, while Li Ming is urging us to compromise and we will figure out another way of getting oil cheaper before it becomes a bigger issue."
  prc.crisis.4.a:0 "Declare them riots, send in the police"
  prc.crisis.4.b:0 "Fine, Send in Negotiators"

  prc.crisis.5.t:0 "Students march with the rioters"
  prc.crisis.5.d:0 "Since all negotiations were ended and Police sent in, the government has continued to slash more funds and have now affected the students. With the government showing no signs of negotiating through peace, the students have swelled the riots and march against the undernumbered police. Li Ming is urging Whang to reconsider going down this path and seek a peaceful resolution, while Cheng is demanding the Government stands behind him and let him do what needs to be done"
  prc.crisis.5.a:0 "Cheng, You have the backing of the government"
  prc.crisis.5.b:0 "Cheng needs oversight"

  prc.crisis.6.t:0 "Students ask for seat in negotiations"
  prc.crisis.6.d:0 "Since the protest began, the government has slashed more funds going to the people and it's now affecting the students, who in response have unified with the Oil Protestors. They are demanding to have a seat at the negotiating table and demand fiscal reform to meet student demands. Cheng has stormed off, babbling about Ming being a Reactionary and an agent of the west."
  prc.crisis.6.a:0 "Allow them a seat"
  prc.crisis.6.b:0 "Refuse them a seat"

  prc.crisis.7.t:0 "The Negotiation"
  prc.crisis.7.d:0 "An End to the protest is within our grasp. Li Ming’s negotiators have worked out a deal where we could end the strikes by restoring subsidies of the economy and refinancing the healthcare system. However the money to fund it will come out of the PLA annual budget, a move that will enrage the hardliners and members of Whang’s bloc that lean towards the hardliners. Chairman Xin has issued a blunt warning: fail to secure peace, and he will use the Emergency Act to impose order. Whang must choose between keeping his bloc unified and let Xin take over or let this protest end without blood but risking support within congress."
  prc.crisis.7.a:0 "Xin, declare an Emergency."
  prc.crisis.7.b:0 "Li, you have our support."

  prc.crisis.8.t:0 "So begins the rectification campaign"
  prc.crisis.8.d:0 "Since the end of the recent protests across the nation, President Xin, backed by Whang, has initiated a dramatic re-centring of the party. His campaign, dubbed \"The Rectification campaign,\" will demand Absolute political alignment so that China can survive and prosper through this resource crisis. Cheng has backed the mandate to win favour, and the technocrats are the biggest backers of it outside of Whang’s bloc. However, the reformists, whose liberalisation efforts failed during the protests, continue to stall. If they continue to act like this, the government may brand their reforms as \"western counter-revolutionaries\"."
  prc.crisis.8.a:0 "A Xin-Cheng government is the future"

