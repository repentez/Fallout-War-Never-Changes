 prc.violence.1.t:0 "Purging The People's Armed Police"
 prc.violence.1.d:0 "Comrade Cheng demanded a Politburo meeting in which General Secretary Whang consented to. Immediately Cheng went off, yelling about the PAP’s top general and his crew ignoring orders. He blames “reactionaries” in the ranks and says the Politburo’s constant delays blocking or sitting on his plans to fire disloyal officers are the real problem. “I need total control to clean out my commission, no Politburo approval needed!” he shouts. The room explodes with arguments, comrades shouting over each other. Whang slams his fist, telling everyone to cool it, and ends the meeting for the day. \n\nLater, Comrade Li pulls Whang aside, looking nervous. “Cheng’s gone too far,” she says. “We all know if you let him do this, he will butcher every protest against him.” The Politburo meets again, waiting for Whang’s final call."
 prc.violence.1.a:0 "Cheng, Your request is approved"
 prc.violence.1.b:0 "Cheng, You need Mediating"

