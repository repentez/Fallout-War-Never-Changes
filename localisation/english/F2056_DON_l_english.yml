 ### LEADERS ###

 pro_ukrain_leader: "pro-ukrain"
 pro_ukrain_leader_tt: "Dmitry Ovseenko is the Chairman of the Supreme Council of the Novorossiyan SSR. He is a typical representative of the party bureau and nomenklatura who was lucky enough to escape repression by the reformist wing of the CPSU. But unlike others, he advocates for the return of Novorossiya to the Ukrainian SSR, which in the recent past seemed very likely, but the collapse of the USSR and the gradual de-Sovietization of Ukraine destroyed his plans. He found himself in the wrong place at the wrong time."

