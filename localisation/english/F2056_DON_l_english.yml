 ### IDEAS ###

 DON_young_soviet_republic_idea: "Young Soviet Socialist Republic"
 DON_young_soviet_republic_tt: "The Novorossiyan SSR is the youngest republic in the Soviet Union. It was established in 2005 as a result of Novorossiya's separation from the Ukrainian SSR for economic reasons. The republic gradually developed and a state apparatus was formed, but just like 51 years ago. Every couple of years, the Ukrainian SSR demands the return of Novorossiya to Ukraine, either as an autonomous Soviet republic or under direct administration, but Moscow's response has always been negative. Perhaps Ukraine will take Novorossiya back, no matter how, but it will take it back."