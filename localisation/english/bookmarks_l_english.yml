l_english:
    DDR_GATHERING_STORM_DESC:0 "The peace talks which would've seen the unification of West and East Germany in the 1990s fell apart just as fast as the USSR did initially, the government now left adrift in the international community as the only nations they even really interacted with diplomatically remained the former satellite states of the USSR. When the Soviets returned to "liberate" Eastern Europe, Eastern Germany allowed them in with open arms, the few reforms they'd pushed to stabilize their situation being repeeled quickly as a pro-Soviet government was once more established, little actually changing for them throughout the decades, past that of the political climate which, following the initial collapse of the USSR, saw the rise of political extremism in conservative and liberal circles, Republican and Nationalist ideals returning to the once scarred German people as groups like the Monarchist movement began rapidly gaining popularity. It has been due to this that East Germany's situation has become so precarious, one bad move by the government capable of lighting their control ablaze as they walk a fine line between blatant Stalinism and Republican idealism."
    BUL_GATHERING_STORM_DESC:0 "Bulgaria is not in the best situation, at the time of 2056 in the country agricultural crisis, bloody purges and just instability flourish in the country. Nikul Vasilev - the leader and general secretary of BKP holds power tightly and suppresses any threat to his rule. Will the people of Bulgaria be able to free themselves before it is too late?"
    USA_BATTLE_OF_ANCHORAGE_DESC:0 "This morning, without warning, the communist menace has dared to set foot on American soil. War, War Never Changes."