l_english: 
 SOV_zastoy_idea: "Stagnation in foreign policy."
 SOV_zastoy_idea_tt: "The Union of Soviet Socialist Republics ceased to participate in the Cold War in the 2000s, when the USSR “accepted” NATO's victory in the Cold War against it. Left with only its sphere of influence in Eastern Europe, the USSR stopped helping other countries in any way, finally abandoning the ideas of Marxism-Leninism. Now the USSR is just watching the new Cold War between the US and China, remaining in the shadows."
 SOV_war_economic_idea: "Market Socialism in a War Economy."
 SOV_war_economic_idea_tt: "The economy of the Union of Soviet Socialist Republics has long since ceased to resemble that of a socialist state. During the times of Khrushchev, Brezhnev, and Kosygin, reforms were carried out, which resulted in the introduction of capitalism. When Gorbachev, Yakovlev, and Yavlinsky were in power, the construction of market socialism was completed, but now... Kozlov's policies towards the economy have led to its militarization. To put it mildly, the civilian sector has been neglected, and preparations for “war” with the European Community and the US have been a priority. Everything is going into the military industry and technology, while ordinary people have been experiencing a shortage of goods since the 2040s."
