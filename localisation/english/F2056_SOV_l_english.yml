 SOV_zastoy_idea: "Stagnation in foreign policy."
 SOV_zastoy_idea_tt: "The Union of Soviet Socialist Republics ceased to participate in the Cold War in the 2000s, when the USSR “accepted” NATO's victory in the Cold War against it. Left with only its sphere of influence in Eastern Europe, the USSR stopped helping other countries in any way, finally abandoning the ideas of Marxism-Leninism. Now the USSR is just watching the new Cold War between the US and China, remaining in the shadows."

