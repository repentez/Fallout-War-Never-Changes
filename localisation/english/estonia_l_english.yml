l_english:
  

    #NATIONAL FOCUSES#
    EST_restore_talinn_bunk:0 "Restore the Talinn Bunker"
    EST_restore_talinn_bunk_desc:0 "Having fought for the Baltics back in the Great Patriotic War, and having to hold it from continued partisan resistance, the Soviets have had to fortify the region with a number of Bunkers meant to cement their control over what they consider rightful Soviet territory. But our brave fighters have since learned the art of fighting within these Soviet Bunkers."
 EST_fortify_Parnu:0 "Fortify Parnu"
 EST_fortify_Parnu_desc:0 "If we are to hold Estonia, we must make sure that the Soviets cannot take it. Parnu represents the last possible holdout for our forces, and we must be prepared for the worse case scenario."

 EST_fortify_Rakvere:0 "Fortify Rakvere "
 EST_fortify_Rakvere_desc:0 "We have managed to push the Soviets back east, now let us hold dig in and hold onto our land."

 EST_fortify_Tartu:0 "Forify Tartu"
 EST_fortify_Tartu_desc:0 " We have managed to push the Soviets to the south, liberating the majority of our rightful land. And now we shall fortify it so that they can never come back."
 
 EST_fortify_Kuressaare:0 "Forify Kuressaare"
 EST_fortify_Kuressaare_desc:0 "Let us hold dig in and hold onto our land. " 

 EST_window_to_the_west:0 "Window to the West" 
 EST_window_to_the_west_desc:0 " Estonia lies in a strategic position on the Baltic Sea, where we have been able to listen in to the linguistically similar Finnish Radio, which for decades have let Estonians slight access to the western world and developments in the United States and the European Commonwealth. This gave Estonians a position of prestige during the abortive attempts at reform and westernization in the 1980's. But still it has allowed us a position above many other Soviet subjects, one which in our time of need we can now leverage. "

 EST_baltic_environmentalism:0 "Baltic Environmentalism" 
 EST_baltic_environmentalism_desc:0 "We have always been a people who loved our land. But that love of our land allowed us to resist Soviet Occupation in surprising ways. Militia's formed hiding out in the woods that lived as one with nature by necessity. But opposition to Soviet-Industrialization by the common-man not willing to arm themselves has proven a surprise success in the past. We live in an era of relentless technological process- but we cannot save this land simply by adopting the ways of our enemies. We will save this land and its bounty."
 
 EST_legacy_phosphorite_war:0 "Legacy of the Phosphorite War"
 EST_legacy_phosphorite_war_desc:0 "Estonia lies home to one of Europes largest reserves of Phosphorite. And this lay at the heart of one of our greatest victories against the Soviet Occupiers. When they wished to come in here and take our resources away from us, we stood together, patriot and communist, and they stood down. The courage of those days lies as a rallying cry today. And that besides- phosphorite makes for good explosives. And explosives makes for good dead Soviets." 

 EST_sustainable_energy_development:0 "Sustainable Energy Development"
 EST_sustainable_energy_development_desc:0 "Our land is home to several peat bogs and shale oil deposits. Most of our oil reserves were exhausted by our foolish Soviet occupiers, but we are wiser. We have been at the forefront of several avenues of renewable energy research in the USSR. With skill and wisdom we can harness a source of fuel we can use to alleviate the global oil crisis- or at least how the global oil crisis impacts us."

 EST_economic_recon:0 "Economic Restructuring"
 EST_economic_recon_desc:0 "We have been under a planned economy while we've been under the USSR, which has been rife with corruption and beuracracy. We might not be able to revive a free market over night, but perhaps more practically we can mobilize what we have available to towards winning against the soviets. And furthermore if we don't we may very well fail."

 EST_Institute_cap:0 "Institute Capitalist Reform"
 EST_Institute_cap_desc:0 "With our factories mobilized there's a chance to make alliances with would-be business owners. We've ousted the old communist beauracrats, and there's a new class of would-be industrialists waiting in the wings to join us. Whether motivated by promises of wealth or patriotism, if they stand with us against Soviet occupation then we stand together."

 EST_solicit_bis:0 "Solicit Business Support"
 EST_solicit_bis_desc:0 "It's too early to tell if our economic policies truely constitute success thus far. But still those eager to shake off the yoke of communism are without end. They are a motley crew, risking not just their money, their property, but their very lives if we fail. But still they come from both other Soviet Republics, and from the Capitalist nations of Europe, willing to invest in our success."

 EST_restore_contact:0 "Restore Contact with the Exiled Government"
 EST_restore_contact_desc:0 "Ever since the Soviet Occupation, an Estonian Government in Exile has been operating within the European Commonwealth, initially composed of Estonian politicians and diplomats that fled the occupation, and various Estonian expats and businessmen. It has been a long time since it was formed, and it's changed faces more than a few time. But our uprising is the moment they've been waiting for."

 EST_scandi_contact:0 "Scandinavian Contacts"
 EST_scandi_contact_desc:0 "While most of Europe is currently distracted with other conflicts, the Scandinavians have a particular interest in our plight. We share a cultural bond, but more than that the specter of Soviet incursion is one they don't take lightly. While they might not have much to offer, we should still see what they might be willing to offer us."

 EST_Soviet_exiles:0 "Garner Support from Soviet Exiles"
 EST_Soviet_exiles_desc:0 "While we have our one Exiled Government from long ago, we're not alone in that regard. Whether it be from the last century or more recently, there's been a long stream of those looking to escape the USSR and Eastern Bloc, settling elsewhere in the west. While many would prefer to stay far away, others we could entice to join us, to strike a blow against the Communist Bear."

 EST_Baltic_resist:0 "Encourage Baltic Resistance"
 EST_Baltic_resist_desc:0 "Our victories have served as a rallying cry for those who wish for freedom from the Soviets, but particularly our neighbors in the Baltic. We've shown we can hold out this long. And we have like minded compatriots nearby. We should launch a campaign of resistance within Latvia and Lithuania, show them that together we can resist."

 EST_spread_Metsavagi:0 "Spread Metsavagi to the Baltic"
 EST_spread_Metsavagi_desc:0 "Similar bands to our Metsavagi have existed in other Baltic nations, and remnants of them still persist or could be rekindled. If we help bring them together, share our tactics, and rally their resistance we might inspire similar successes to our own."


 EST_rally_to_the_cause:0 "Rally to the Cause"
 EST_rally_to_the_cause_desc:0 "Our campaigns to the south have been a success, as the Soviets have been forced to shift their resources away from us. Furthermore the Latvians and Lithuanians yearn to breathe free once more. We stand together in solidarity now- their cause is our cause, their blood is our blood."


 EST_unify_Metsavagi:0 "Unify Metsavagi Command"
 EST_unify_Metsavagi_desc:0 "The resistance campaigns of our fellow Baltics have been a success. We just need to bring together our forces under a central command so we can better coordinate our resistance. And then we shall not simply free ourselves, we shall march to the south and free our Baltic brothers and restore their honor."


 EST_Rally_european:0 "Rally European Commonwealth Exiles"
 EST_Rally_european_desc:0 "The situation in the European Commonwealth has deteriorated so far past what any could have imagined a few years ago. We stand more isolated than ever. But we may not yet be alone. There's a number of highly skilled soldiers in the European military who would rather be fighting the Communists than each-other, and there are no small number of chances to do just that here."


 EST_where_were_u:0 "Where were you when Estonia bled ?"
 EST_where_were_u_desc:0 "Our uprising was thanks to the brave Metsavagi having spent decades alone in the wilderness standing against the Soviet Occupiers. Other Estonians simply stood to the side and kept their heads down. Others worse became collaborators, at best trying to work within a corrupt system to ease its burden, or at worst eagerly stepping on the necks of their countrymen."


